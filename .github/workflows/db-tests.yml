name: DB tests (v7.0)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  rls:
    name: RLS negative tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Start local Supabase
        run: |
          cd db && supabase start
          # Print URLs + keys for the test step
          supabase status --output json > ../supabase-status.json

      - name: Apply migrations
        run: |
          cd db && supabase db reset --no-seed

      - name: Run RLS tests
        env:
          SUPABASE_URL: http://127.0.0.1:54321
        run: |
          export SUPABASE_ANON_KEY=$(jq -r '.ANON_KEY' supabase-status.json)
          export SUPABASE_SERVICE_ROLE_KEY=$(jq -r '.SERVICE_ROLE_KEY' supabase-status.json)
          npm run test:rls

      - name: Stop Supabase
        if: always()
        run: cd db && supabase stop --no-backup
