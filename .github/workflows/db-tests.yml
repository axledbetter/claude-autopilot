name: DB tests (v7.0)

on:
  push:
    # codex W4 safety net: full run on every master push.
    branches: [master]
  pull_request:
    branches: [master]
    # v7.1.5 — change-aware CI. RLS tests verify Postgres row-level
    # security on the v7.0 schema. Only relevant when migrations or
    # the test files themselves change.
    paths:
      - 'db/**'
      - 'tests/rls/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/db-tests.yml'

jobs:
  rls:
    name: RLS negative tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Install Supabase CLI
        # Official action: installs the supabase binary to PATH (npm install -g
        # supabase doesn't actually expose the binary on most CI images).
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        # Run all supabase commands from the repo root with --workdir db.
        # Don't `cd db` — that compounds with --workdir to chdir into db/db.
        run: |
          supabase start --workdir db
          supabase status --workdir db --output json > supabase-status.json

      - name: Apply migrations
        run: supabase db reset --no-seed --workdir db

      - name: Wait for PostgREST schema cache to warm up
        # Recurring flake (Phase 5.1, 5.7, 7.1.3 all hit it): PostgREST
        # caches the schema asynchronously AFTER `supabase db reset`
        # finishes. The first SDK queries from the test runner often
        # arrive while the cache is still being built and fail with
        #   PGRST002: "Could not query the database for the schema cache.
        #   Retrying."
        # PostgREST exposes the cache state implicitly through the OpenAPI
        # spec at GET / — once the spec resolves to a valid JSON document
        # with an `info` field, the cache is warm.
        env:
          SUPABASE_URL: http://127.0.0.1:54321
        run: |
          export SUPABASE_ANON_KEY=$(jq -r '.ANON_KEY // .anon_key' supabase-status.json)
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Failed to extract anon key from supabase status output" >&2
            cat supabase-status.json >&2
            exit 1
          fi
          # Poll up to 60s; success when the schema OpenAPI doc returns
          # 200 AND parses as JSON with an `info` field. Re-tries every 1s.
          for i in $(seq 1 60); do
            body=$(curl -fsSL \
              -H "apikey: $SUPABASE_ANON_KEY" \
              "$SUPABASE_URL/rest/v1/" 2>/dev/null) && \
              echo "$body" | jq -e 'has("info")' >/dev/null 2>&1 && \
              echo "[wait-postgrest] schema cache warm after ${i}s" && exit 0
            sleep 1
          done
          echo "[wait-postgrest] timeout: PostgREST schema cache did not warm after 60s" >&2
          curl -i -H "apikey: $SUPABASE_ANON_KEY" "$SUPABASE_URL/rest/v1/" >&2 || true
          exit 1

      - name: Run RLS tests
        env:
          SUPABASE_URL: http://127.0.0.1:54321
        run: |
          export SUPABASE_ANON_KEY=$(jq -r '.ANON_KEY // .anon_key' supabase-status.json)
          export SUPABASE_SERVICE_ROLE_KEY=$(jq -r '.SERVICE_ROLE_KEY // .service_role_key' supabase-status.json)
          if [ -z "$SUPABASE_ANON_KEY" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Failed to extract keys from supabase status output:" >&2
            cat supabase-status.json >&2
            exit 1
          fi
          npm run test:rls

      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup --workdir db || true
