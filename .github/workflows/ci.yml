name: CI

on:
  push:
    # Master + tag pushes ALWAYS run the full CI (safety net for any path
    # filter on pull_request below — codex pass W4).
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
    # v7.1.5 — change-aware CI matrix. Skip the CLI test job for PRs that
    # only touch apps/web/**, db/**, tests/rls/**, or docs/**.
    # Conservative path groups: any change to root package.json, lockfile,
    # tsconfig*, scripts/**, presets/**, OR this workflow file triggers
    # a full run.
    paths:
      - 'src/**'
      - 'bin/**'
      - 'tests/**'
      - 'scripts/**'
      - 'presets/**'
      - 'tsconfig*.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci.yml'

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['22']

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      # v7.8.0 — AST audit blocks any static value-import of
      # `@supabase/supabase-js` outside the dashboard allowlist. supabase
      # is an optionalDependency; a regression here would break local-only
      # users who install with `npm install --omit=optional`. Run BEFORE
      # tests so a clear failure shows up first.
      - name: Audit supabase imports
        run: npm run audit:supabase

      - name: Test
        run: node scripts/test-runner.mjs

  publish:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Validate tag matches package version
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag ${{ github.ref_name }} does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="$REF_NAME"
          # Phase 6 — strict semver tags (v1.2.3) → latest. Anything with a
          # pre-release suffix (-pre, -alpha, -beta, -rc, …) → next.
          # Source of truth for npm dist-tags; package.json publishConfig.tag
          # is just the safer fallback when running `npm publish` by hand.
          if [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then TAG="latest"; else TAG="next"; fi
          PKG_VERSION=$(node -p "require('./package.json').version")
          PKG_NAME=$(node -p "require('./package.json').name")
          EXISTING=$(npm view "${PKG_NAME}@${PKG_VERSION}" version 2>/dev/null || echo "")
          if [ "$EXISTING" = "$PKG_VERSION" ]; then
            echo "Version $PKG_VERSION already published — skipping"
            exit 0
          fi
          npm publish --access public --tag "$TAG"
