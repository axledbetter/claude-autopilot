name: Claude Autopilot
description: >
  Run the autopilot pipeline on changed files, upload findings to GitHub Code
  Scanning (SARIF), and annotate the PR diff inline.
author: axledbetter

inputs:
  config:
    description: Path to guardrail.config.yaml
    default: guardrail.config.yaml
  version:
    description: Package version to install (e.g. 1.0.0-alpha.5, latest, alpha)
    default: alpha
  sarif-output:
    description: Path to write SARIF results file
    default: autopilot-results.sarif
  openai-api-key:
    description: OpenAI API key for the review engine. Pass via secrets.
    required: false

# SECURITY: Use this action only on `pull_request` (same-repo) events.
# Do NOT use on `pull_request_target` with fork PRs — that would execute
# untrusted code with secrets available. For fork PR support, omit
# openai-api-key and run in a separate unprivileged job.

runs:
  using: composite
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js 22
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: npm

    - name: Run autopilot pipeline
      run: |
        npx -y @delegance/guardrail@${{ inputs.version }} \
          run \
          --config "${{ inputs.config }}" \
          --format sarif \
          --output "${{ inputs.sarif-output }}"
      shell: bash
      env:
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}

    - name: Upload SARIF to GitHub Code Scanning
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: ${{ inputs.sarif-output }}
