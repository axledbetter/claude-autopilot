configVersion: 1
reviewEngine: { adapter: auto }
vcsHost: { adapter: github }
reviewBot: { adapter: cursor }
# No migrationRunner — the migrate phase will no-op with a notice pointing
# to `.claude-autopilot/stack.yaml` for users who want to wire one up.
protectedPaths:
  - "**/auth/**"
  - "**/payment/**"
  - "**/encryption/**"
  - "**/secret/**"
  - "**/keys/**"
staticRules:
  - hardcoded-secrets
  - npm-audit
  - package-lock-sync
  - sql-injection
  - missing-auth
  - ssrf
  - insecure-redirect
policy:
  failOn: critical
  newOnly: false
thresholds:
  bugbotAutoFix: 85
  bugbotProposePatch: 60
  maxValidateRetries: 3
reviewStrategy: auto
chunking:
  smallTierMaxTokens: 8000
  partialReviewTokens: 60000
  perFileMaxTokens: 32000
pipeline:
  runReviewOnStaticFail: true
  # Default true so that failed/missing test commands don't silently kill the
  # LLM review phase. Most common case: user runs `setup` on a fresh repo,
  # auto-detected test command is `npm test` but no test script exists →
  # exit 1 → review skipped → user sees nothing useful. Review on failing
  # code is the path where review is *most* valuable.
  runReviewOnTestFail: true
# Optional: multi-model council. Uncomment + set ANTHROPIC_API_KEY and/or
# OPENAI_API_KEY. Models are dispatched in parallel; the synthesizer reads
# their responses and writes the consensus. Both APIs supported (chat-completions
# and Responses API for codex/o-series models — auto-detected by name).
# Usage: claude-autopilot council --prompt "..." --context-file <path>
# council:
#   models:
#     - { adapter: claude, model: claude-opus-4-7, label: opus }
#     - { adapter: openai, model: gpt-5.3-codex,  label: codex }
#   synthesizer: { adapter: claude, model: claude-sonnet-4-6, label: synth }
#   timeout_ms: 30000
#   min_successful_responses: 1
