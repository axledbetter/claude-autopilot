configVersion: 1
reviewEngine: { adapter: codex }
vcsHost: { adapter: github }
reviewBot: { adapter: cursor }
protectedPaths:
  - "migrations/**"
  - "internal/auth/**"
  - "internal/crypto/**"
staticRules:
  - hardcoded-secrets
  - go-sql-injection
testCommand: go test ./...
thresholds:
  bugbotAutoFix: 85
  bugbotProposePatch: 60
  maxValidateRetries: 3
reviewStrategy: auto
chunking:
  smallTierMaxTokens: 8000
  perFileMaxTokens: 32000
